name: 'analytics_project'
version: '1.0.0'
config-version: 2
profile: 'analytics_project'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
data-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  analytics_project:
    materialized: view
    staging:
      materialized: view
    intermediate:
      materialized: table
    marts:
      materialized: table

vars:
  start_date: '2024-01-01'
  end_date: '2024-12-31'

seeds:
  quote_columns: false

snapshots:
  snapshot_path: 'snapshots'
